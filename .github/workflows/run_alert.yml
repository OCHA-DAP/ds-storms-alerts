name: Run Storm Alert

on:
  workflow_dispatch:
    inputs:
      issued_time:
        description: 'Issued time of forecast (format: YYYY-MM-DDTHH). Leave blank to use current UTC time.'
        type: string
        required: false
      test_email:
        description: 'TEST_EMAIL: If True, send to test list instead of prod (fallback: repo var or True)'
        type: choice
        options:
          - 'True'
          - 'False'
      dry_run:
        description: 'DRY_RUN: If True, skip write/email operations (fallback: repo var or True)'
        type: choice
        options:
          - 'True'
          - 'False'
  schedule:
    - cron: '0 0,6,12,18 * * *'

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Set issued time
        id: time
        run: |
          if [ -n "${{ inputs.issued_time }}" ]; then
            echo "val=${{ inputs.issued_time }}" >> $GITHUB_OUTPUT
          else
            echo "val=$(date -u +'%Y-%m-%dT%H')" >> $GITHUB_OUTPUT
          fi
      - name: Run alert pipeline
        env:
          DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS }}
          DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
          DSCI_AZ_DB_DEV_PW: ${{ secrets.DSCI_AZ_DB_DEV_PW }}
          DSCI_AZ_DB_DEV_UID: ${{ secrets.DSCI_AZ_DB_DEV_UID }}
          DSCI_AZ_DB_DEV_HOST: ${{ secrets.DSCI_AZ_DB_DEV_HOST }}
          DSCI_LISTMONK_BASE_URL: https://listmonk-demo-afhcg8e2hde0fxca.eastus2-01.azurewebsites.net/api
          DSCI_LISTMONK_API_USERNAME: ${{ secrets.DSCI_LISTMONK_API_USERNAME }}
          DSCI_LISTMONK_API_KEY: ${{ secrets.DSCI_LISTMONK_API_KEY }}
          TEST_EMAIL: ${{ inputs.test_email || vars.TEST_EMAIL || 'True' }}
          DRY_RUN: ${{ inputs.dry_run || vars.DRY_RUN || 'True' }}
        run: uv run python pipelines/run_alert.py --issued-time ${{ steps.time.outputs.val }}
