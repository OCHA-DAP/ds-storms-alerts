# Databricks Asset Bundle — runs the storm-alert pipeline as a DBX job.
#
# There is one live job (the `prod` target, the default). It handles both the
# scheduled runs and any ad-hoc manual runs (override params per run):
#
#   databricks bundle deploy -p default                                  # deploy prod
#   databricks bundle run storm_alert -p default                         # manual run (live params)
#   databricks bundle run storm_alert -p default --params issued_time=2025-10-24T18
#   databricks bundle run storm_alert -p default --params test_email=True,dry_run=True
#
# The `dev` target is for feature work: deploy it on-demand pointed at a feature
# branch — it auto-pauses the schedule and uses the test list, so it never
# competes with prod. Tear it down when the feature merges:
#
#   databricks bundle deploy  -t dev -p default --var git_branch=my-feature
#   databricks bundle run     storm_alert -t dev -p default              # manual test run
#   databricks bundle destroy -t dev -p default
#
# The job clones this repo (source: GIT) at ${var.git_branch} and runs the thin
# wrapper databricks/run_alert_job.py, which shells out to pipelines/run_alert.py.
# Pipeline code (pipelines/, src/) stays pure Python and is unchanged.
#
# Bundle docs: https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: ds-storms-alerts

# The job runs entirely from source: GIT, so the deploy-time file sync isn't
# used at runtime. Exclude the large data/*.parquet files — uploading them is
# unnecessary and was timing out (HTTP 408) on the bigger boundary files.
sync:
  exclude:
    - "data/**"

variables:
  existing_cluster_id:
    description: Interactive cluster the job runs on (carries the DSCI_AZ_* env vars)
    default: "0515-161935-i2w5mxhc"
  git_branch:
    description: Branch the job pulls the pipeline from
    default: initial-pipeline
  # Send-mode switches (the DBX analog of the GHA repo vars). Flip without
  # editing files via, e.g.:  databricks bundle deploy -t prod --var test_email=False
  dry_run:
    description: '"True" = generate but skip send/write; "False" = actually send'
    default: "False"
  test_email:
    # Default is the safe test list; the prod target overrides to "False" (see below).
    description: '"True" = Tristan-only test list; "False" = real per-country subscriber lists'
    default: "True"

targets:
  prod:
    # The live job (default target). Production mode runs the schedule as defined.
    # (run_as / a shared root_path can be revisited when cutting over off a
    # personal identity.)
    mode: production
    default: true
    workspace:
      profile: default
      root_path: /Workspace/Users/adm.tdowning@global.un.org/.bundle/${bundle.name}/${bundle.target}
    variables:
      # Live: send to the real per-country subscriber lists (not the test list).
      # Still reads the DEV database (run_alert.py is stage="dev").
      test_email: "False"
  dev:
    # On-demand feature-branch testing only — deploy with --var git_branch=<branch>.
    # Development mode auto-pauses the schedule and prefixes the job name
    # ("[dev <user>] Storm Alert"), and test_email defaults to True (test list),
    # so it never competes with the live prod job. Destroy when done.
    mode: development
    workspace:
      profile: default

resources:
  jobs:
    storm_alert:
      name: Storm Alert
      git_source:
        git_url: https://github.com/OCHA-DAP/ds-storms-alerts.git
        git_provider: gitHub
        git_branch: ${var.git_branch}

      schedule:
        # 03:30 / 09:30 / 15:30 / 21:30 UTC — ~30 min after each NHC advisory,
        # giving the upstream ds-storms-pipeline time to land its outputs.
        # No explicit pause_status: prod (production mode) runs it; the dev
        # target (development mode) auto-pauses it. Setting UNPAUSED here would
        # override dev's auto-pause and make dev fire too — don't.
        quartz_cron_expression: "0 30 3,9,15,21 * * ?"
        timezone_id: UTC

      max_concurrent_runs: 1

      parameters:
        - name: issued_time      # YYYY-MM-DDTHH backfill override; "" → realtime
          default: ""
        - name: test_email       # send-mode switch (see variables block)
          default: ${var.test_email}
        - name: dry_run          # send-mode switch (see variables block)
          default: ${var.dry_run}

      tasks:
        - task_key: run_alert
          existing_cluster_id: ${var.existing_cluster_id}
          spark_python_task:
            python_file: databricks/run_alert_job.py
            source: GIT
            parameters:
              - "{{job.parameters.issued_time}}"
              - "{{job.parameters.test_email}}"
              - "{{job.parameters.dry_run}}"
          libraries:
            - pypi: { package: "ocha-stratus>=0.1.7" }
            - pypi:
                package: "ocha-relay @ git+https://github.com/OCHA-DAP/ocha-relay.git@2d4870749faa4235e65164b731e0a574a2e209ab"
            - pypi: { package: "matplotlib>=3.9" }
            - pypi: { package: "geopandas" }
            - pypi: { package: "databricks-sdk" }
